name: Sync Supabase Schema for AI Context

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write # IMPORTANT: Grants permission to commit files back
    steps:
      - uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Pull Schema
        run: |
          mkdir -p supabase/schemas
          supabase db dump --db-url "${{ secrets.SUPABASE_DB_URL }}" --schema public > supabase/schemas/schema.sql

      - name: Commit Schema
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "update database schema for AI context"
          file_pattern: 'supabase/schemas/schema.sql'